[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[edge_functions]]
  path = "/api/analyze-fast"
  function = "analyze-fast"

[[edge_functions]]
  path = "/api/analyze-rich"
  function = "analyze-rich"

# API routes must NOT be caught by the SPA redirect
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = false

# SPA catch-all — MUST come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
