[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[edge_functions]]
  path = "/api/analyze-fast"
  function = "analyze-fast"

[[edge_functions]]
  path = "/api/analyze-rich"
  function = "analyze-rich"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
